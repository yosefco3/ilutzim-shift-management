<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  body { font-family: var(--font-sans); color: var(--text); padding: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Field, TextInput, Select, Textarea, Button } = window.IlutsimDesignSystem_f4254f;
  function Demo() {
    const [first, setFirst] = React.useState('יוסף');
    const [role, setRole] = React.useState('AHMASH');
    const [notes, setNotes] = React.useState('');
    return (
      <div className="grid">
        <div>
          <Field label="שם פרטי">
            <TextInput value={first} onChange={e => setFirst(e.target.value)} />
          </Field>
          <Field label="טלפון" hint="מספר נייד לקבלת התראות">
            <TextInput placeholder="050-0000000" />
          </Field>
          <Field label="תפקיד">
            <Select value={role} onChange={e => setRole(e.target.value)}>
              <option value="AHMASH">אחמ"ש</option>
              <option value="BASIC_GUARD">מאבטח בסיסי</option>
              <option value="LEVEL_B">מאבטח רמה ב'</option>
              <option value="CHECKER">בודק</option>
            </Select>
          </Field>
        </div>
        <div>
          <Field label="הערות כלליות" hint="אופציונלי">
            <Textarea value={notes} placeholder="הערות נוספות (אופציונלי)..." onChange={e => setNotes(e.target.value)} />
          </Field>
          <div style={{ display: 'flex', gap: 10, marginTop: 4 }}>
            <Button variant="primary">שמור</Button>
            <Button variant="secondary">ביטול</Button>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
