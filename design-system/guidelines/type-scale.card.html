<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="Heebo — page H2 down to meta / badge text" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  body { font-family: var(--font-sans); color: var(--text); padding: 20px; }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .tag { font-size: var(--fs-xs); color: var(--text-dim); font-family: ui-monospace, monospace; min-width: 130px; }
  .samp { color: var(--text); }
</style>
</head>
<body>
  <div class="line"><span class="tag">2xl · 24px · 650</span><span class="samp" style="font-size:var(--fs-2xl); font-weight:var(--fw-heading); letter-spacing:var(--ls-tight)">ניהול מאבטחים</span></div>
  <div class="line"><span class="tag">xl · 20px · 700</span><span class="samp" style="font-size:var(--fs-xl); font-weight:var(--fw-bold); letter-spacing:var(--ls-tight)">ניהול מערכת אילוצים</span></div>
  <div class="line"><span class="tag">lg · 17px · 600</span><span class="samp" style="font-size:var(--fs-lg); font-weight:var(--fw-semibold)">כותרת כרטיס שבוע</span></div>
  <div class="line"><span class="tag">base · 14px · 400</span><span class="samp" style="font-size:var(--fs-base)">טקסט גוף וכפתורים — ברירת המחדל של הממשק</span></div>
  <div class="line"><span class="tag">sm · 13px · 400</span><span class="samp" style="font-size:var(--fs-sm); color:var(--text-muted)">רמז קצר מתחת לשדה</span></div>
  <div class="line" style="border:none"><span class="tag">xs · 12px · 600 · caps</span><span class="samp" style="font-size:var(--fs-xs); font-weight:var(--fw-semibold); text-transform:uppercase; letter-spacing:var(--ls-caps); color:var(--text-dim)">SUBMITTED AT</span></div>
</body>
</html>
