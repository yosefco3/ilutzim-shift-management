<!-- @dsCard group="Colors" viewport="700x200" name="Semantic States" subtitle="Solid + soft tint pairs for danger / success / warning / info" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  body { font-family: var(--font-sans); color: var(--text); padding: 18px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .chip { height: 40px; }
  .soft { height: 28px; display: flex; align-items: center; padding: 0 10px; font-size: var(--fs-xs); font-weight: var(--fw-semibold); }
  .meta { padding: 8px 10px; }
  .name { font-size: var(--fs-base); font-weight: var(--fw-semibold); }
  .val { font-size: var(--fs-xs); color: var(--text-dim); font-family: ui-monospace, monospace; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="soft" style="background:var(--danger-soft); color:var(--on-danger)">soft tint</div><div class="meta"><div class="name">danger</div><div class="val">#ef4444</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="soft" style="background:var(--success-soft); color:var(--on-success)">soft tint</div><div class="meta"><div class="name">success</div><div class="val">#22c55e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="soft" style="background:var(--warning-soft); color:var(--on-warning)">soft tint</div><div class="meta"><div class="name">warning</div><div class="val">#f59e0b</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="soft" style="background:var(--info-soft); color:var(--on-info)">soft tint</div><div class="meta"><div class="name">info</div><div class="val">#38bdf8</div></div></div>
  </div>
</body>
</html>
