<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing Scale" subtitle="0.25rem rhythm — 4px → 40px" -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html, body { margin: 0; background: var(--bg); }
  body { font-family: var(--font-sans); color: var(--text); padding: 20px; direction: ltr; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 7px; }
  .bar { background: var(--primary); height: 14px; border-radius: 3px; }
  .tag { font-size: var(--fs-xs); color: var(--text-dim); font-family: ui-monospace, monospace; min-width: 150px; }
</style>
</head>
<body>
  <div class="row"><span class="tag">--space-1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">--space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">--space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag">--space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">--space-5 · 20px · card pad</span><div class="bar" style="width:20px"></div></div>
  <div class="row"><span class="tag">--space-6 · 24px · gutters</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">--space-8 · 32px · main pad</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">--space-10 · 40px · login</span><div class="bar" style="width:40px"></div></div>
</body>
</html>
